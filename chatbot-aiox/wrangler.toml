name = "mega-brain"
main = "src/index.js"
compatibility_date = "2024-06-04"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"

[[kv_namespaces]]
binding = "MEMORY_KV"
id = "754778170b02446f88f2858804797086" # Você precisará criar este KV no painel e atualizar o ID se for diferente

# Regras de inclusão de arquivos (para o catálogo de imóveis)
[site]
bucket = "./database"
